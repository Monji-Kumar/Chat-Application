eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# AUTH SERVICE
# Gateway: /api/auth/register -> auth_service: /auth/register
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1


# USER SERVICE
# Gateway: /api/users/me -> user-service: /users/me
spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1


# CHAT SERVICE
# Gateway: /api/chat/** -> chat_service: /chat/**
spring.cloud.gateway.server.webflux.routes[2].id=chat-service-rest
spring.cloud.gateway.server.webflux.routes[2].uri=lb://chat-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/chat/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

#CHAT SERVICE
# Gateway: /chat-websocket
spring.cloud.gateway.server.webflux.routes[3].id=chat-service-ws
spring.cloud.gateway.server.webflux.routes[3].uri=lb:ws://chat-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/ws/**